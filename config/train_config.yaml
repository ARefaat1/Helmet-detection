# config/train_config.yaml

model:
  name: "yolo26n.pt"      # The base weights
  img_size: 640

training:
  epochs: 100
  batch_size: 16
  patience: 20
  device: "auto"
  workers: 0

hyperparameters:
  lr0: 0.01               # Initial learning rate
  weight_decay: 0.0005    # Prevents overfitting
  mosaic: 1.0             # 100% chance to use mosaic augmentation (great for small objects)
  hsv_v: 0.4              # Brightness variance (crucial for outdoor traffic cameras)